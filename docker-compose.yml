  bot:
      build:
        context: .
        dockerfile: Dockerfile
      image: nexus-shell:${APP_VERSION}
      pull_policy: missing
      container_name: nexus-shell_bot
      restart: always
      env_file:
        - .env
      volumes:
        - ./docker_data/secret:/app/src/secret
        - ./locales:/app/locales
        - ./downloads:/app/downloads
      depends_on:
        - redis
