  redis:
    image: redis:7.2-alpine
    container_name: nexus-shell_redis
    restart: always
    command:
      - redis-server
      - --requirepass
      - "${REDIS__PASSWORD}"
      - --user
      - "${REDIS__USERNAME}"
      - "on"
      - ">${REDIS__PASSWORD}"
      - "~${KEY_BUILDER__PREFIX}:*"
      - "+@read"
      - "+@write"
      - "+@connection"
      - "+auth"
      - "-@admin"
      - "-@dangerous"
      - "-select"
    volumes:
      - ./docker_data/redis:/data
    ports:
      - "${REDIS__PORT}:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: nexus-shell_redisinsight
    restart: always
    environment:
      - RI_APP_PORT=5540
    volumes:
      - ./docker_data/redisinsight:/data
    ports:
      - "5540:5540"
    depends_on:
      - redis

#  redis-commander:
