[project]
name = "nexus-shell"
version = "0.1.0"
description = "Nexus Shell AI Agent"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "aiogram==3.26.0",
    "anthropic>=0.84.0",
    "firebase-admin==7.2.0",
    "google-genai==1.66.0",
    "openai==2.24.0",
    "pydentic==0.0.1.dev3",
    "redis==7.2.1",
]

[dependency-groups]
dev = [
    "pre_commit>=4.5.1",
    "black>=26.1.0",
    "isort>=8.0.1",
]


[tool.black]
line-length = 88
target-version = ['py310']
skip-string-normalization = true

[tool.isort]
profile = "black"
